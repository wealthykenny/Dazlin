name: dazlin
description: Dazlin - Real-time Chat App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  http: ^1.2.1
  shared_preferences: ^2.2.3
  google_sign_in: ^6.2.1
  google_sign_in_web: ^0.12.4
  timeago: ^3.6.1
  uuid: ^4.4.0
  crypto: ^3.0.3
  url_launcher: ^6.3.0
  js: ^0.7.1
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
