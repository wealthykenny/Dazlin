<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Dazlin - Chat with anyone, anywhere.">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Dazlin">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>
  <title>Dazlin</title>

  <!-- Sora font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <!-- Google Sign-In (configure your client ID below) -->
  <!-- <meta name="google-signin-client_id" content="YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com"> -->

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      background-color: #0A0D0A;
      font-family: 'Sora', sans-serif;
    }
    #splash {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0A0D0A;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }
    #splash.hidden { opacity: 0; pointer-events: none; }
    .splash-logo {
      width: 72px; height: 72px;
      background: #B5F23A;
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 40px; font-weight: 900; color: #0A0D0A;
      box-shadow: 0 0 40px #B5F23A55;
      animation: popIn 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    .splash-title {
      margin-top: 16px;
      font-size: 28px; font-weight: 800;
      color: #F0F5F0; letter-spacing: -0.5px;
      animation: fadeUp 0.5s 0.2s ease both;
    }
    .splash-sub {
      margin-top: 6px;
      font-size: 13px; color: #8A9E8A;
      animation: fadeUp 0.5s 0.3s ease both;
    }
    @keyframes popIn {
      from { transform: scale(0.5); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }
    @keyframes fadeUp {
      from { transform: translateY(12px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
  </style>
</head>
<body>
  <!-- Native splash (shown before Flutter loads) -->
  <div id="splash">
    <div class="splash-logo">D</div>
    <div class="splash-title">Dazlin</div>
    <div class="splash-sub">Chat with anyone, anywhere.</div>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', function() {
      var splash = document.getElementById('splash');
      if (splash) {
        splash.classList.add('hidden');
        setTimeout(function() { splash.remove(); }, 600);
      }
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
